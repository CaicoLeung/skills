name: validate-skills

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate skill frontmatter (ADR-0002)
        run: python3 scripts/validate-skills.py
      - name: Check skills index is up to date
        run: python3 scripts/index-skills.py --check
